<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Customer Login Portal | SAVIAA</title>
  <meta name="description" content="Securely log in to SAVIAA via OTP verification, email magic links, or Google account, to track orders and save blouse designs.">
  <link rel="canonical" href="https://saviaa.in/login.html">
  
  <link rel="stylesheet" href="assets/css/style.css">
  <link rel="stylesheet" href="assets/css/components.css">
  <link rel="stylesheet" href="assets/css/pages.css">
  
  <style>
    .login-container {
      max-width: 440px;
      margin: 3rem auto;
      padding: var(--spacing-md);
      background-color: var(--bg-white);
      border: 1px solid var(--border);
      border-radius: var(--radius-card);
      box-shadow: var(--shadow-md);
    }
    
    .social-btn {
      width: 100%;
      padding: 0.75rem;
      border: 1.5px solid var(--border);
      border-radius: 8px;
      font-weight: 600;
      background: var(--bg-white);
      color: var(--dark);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      transition: all var(--transition-fast);
      margin-bottom: var(--spacing-sm);
    }
    
    .social-btn:hover {
      background-color: var(--secondary);
      border-color: var(--dark);
    }
    
    .divider-text {
      text-align: center;
      position: relative;
      margin: 1.5rem 0;
      font-size: var(--fs-caption);
      color: var(--text-muted);
      text-transform: uppercase;
    }
    
    .divider-text::before,
    .divider-text::after {
      content: '';
      position: absolute;
      top: 50%;
      width: 40%;
      height: 1px;
      background-color: var(--border);
    }
    
    .divider-text::before { left: 0; }
    .divider-text::after { right: 0; }
    
    .otp-digits-grid {
      display: flex;
      gap: 0.5rem;
      justify-content: center;
      margin-top: 0.5rem;
    }
    
    .otp-digit {
      width: 45px;
      height: 50px;
      font-size: 1.5rem;
      text-align: center;
      border: 1.5px solid var(--border);
      border-radius: 8px;
      outline: none;
    }
    
    .otp-digit:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(165, 42, 90, 0.08);
    }
  </style>
</head>
<body>

  <!-- Header standard -->
  <header class="header">
    <div class="container nav">
      <a href="index.html" class="logo">SAVIAA<span>.</span></a>
    </div>
  </header>

  <main>
    <section class="section-padding" style="padding-top: 1rem;">
      <div class="container">
        
        <div class="login-container reveal-on-scroll">
          <div style="text-align: center; margin-bottom: var(--spacing-sm);">
            <h1 style="font-size: 1.5rem; font-weight: 800;">Log In to SAVIAA</h1>
            <p style="font-size: var(--fs-body-sm); color: var(--text-muted);">Access your measurements profile & track tailoring</p>
          </div>

          <!-- Google Social login -->
          <button type="button" class="social-btn" onclick="triggerGoogleMockLogin()">
            <!-- Google Vector Icon -->
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none">
              <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
              <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
              <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.06H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.94l2.85-2.22.81-.63z" fill="#FBBC05"/>
              <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.06l3.66 2.84c.87-2.6 3.3-4.52 6.16-4.52z" fill="#EA4335"/>
            </svg>
            Continue with Google
          </button>

          <div class="divider-text">Or Continue with</div>

          <!-- Tabs to switch between OTP and Email Magic Link -->
          <div style="display: flex; gap: 0.5rem; margin-bottom: 1rem; border-bottom: 1px solid var(--border); padding-bottom: 0.5rem;">
            <button class="btn btn-text" id="tab-otp-btn" style="font-weight: 700; color: var(--primary);" onclick="toggleAuthTab('otp')">WhatsApp OTP</button>
            <button class="btn btn-text" id="tab-email-btn" style="font-weight: 500; color: var(--text-muted);" onclick="toggleAuthTab('email')">Email Link</button>
          </div>

          <!-- OTP Form block -->
          <form id="form-otp-auth" onsubmit="triggerOTPRequest(event)">
            <div class="form-group" style="margin-bottom: 1rem;">
              <label for="otp-phone" class="form-label">WhatsApp Mobile Number</label>
              <div style="display: flex; gap: 0.25rem;">
                <span style="border: 1px solid var(--border); border-radius:8px; padding: 0.75rem; font-size: 0.85rem; background:#F8F4F6;">+91</span>
                <input type="tel" id="otp-phone" class="form-input" style="flex:1;" placeholder="Enter 10-digit number" required>
              </div>
            </div>
            <button type="submit" class="btn btn-accent" style="width: 100%; padding: 0.75rem;">Get Verification Code</button>
          </form>

          <!-- OTP Verify Digits block (hidden by default) -->
          <div id="otp-verification-box" style="display: none; margin-top: 1rem;">
            <p style="font-size: 0.85rem; text-align: center;">We sent a 4-digit code to your WhatsApp. Enter it below:</p>
            <div class="otp-digits-grid">
              <input type="text" class="otp-digit" maxlength="1" oninput="this.nextElementSibling?.focus()" aria-label="Digit 1">
              <input type="text" class="otp-digit" maxlength="1" oninput="this.nextElementSibling?.focus()" aria-label="Digit 2">
              <input type="text" class="otp-digit" maxlength="1" oninput="this.nextElementSibling?.focus()" aria-label="Digit 3">
              <input type="text" class="otp-digit" maxlength="1" oninput="triggerVerifyOTP()" aria-label="Digit 4">
            </div>
            <button type="button" class="btn btn-dark" style="width: 100%; margin-top: 1rem;" onclick="triggerVerifyOTP()">Verify Code & Login</button>
          </div>

          <!-- Email Magic Link Form (hidden by default) -->
          <form id="form-email-auth" style="display: none;" onsubmit="triggerEmailRequest(event)">
            <div class="form-group" style="margin-bottom: 1rem;">
              <label for="auth-email" class="form-label">Email Address</label>
              <input type="email" id="auth-email" class="form-input" placeholder="e.g. sravani@gmail.com" required>
            </div>
            <button type="submit" class="btn btn-accent" style="width: 100%; padding: 0.75rem;">Send Magic Login Link</button>
          </form>

        </div>

      </div>
    </section>
  </main>

  <script src="assets/js/main.js"></script>
  <script>
    function toggleAuthTab(tab) {
      const otpForm = document.getElementById('form-otp-auth');
      const emailForm = document.getElementById('form-email-auth');
      const otpBtn = document.getElementById('tab-otp-btn');
      const emailBtn = document.getElementById('tab-email-btn');
      const verifyBox = document.getElementById('otp-verification-box');

      if (tab === 'otp') {
        otpForm.style.display = 'block';
        emailForm.style.display = 'none';
        otpBtn.style.color = 'var(--primary)';
        otpBtn.style.fontWeight = '700';
        emailBtn.style.color = 'var(--text-muted)';
        emailBtn.style.fontWeight = '500';
      } else {
        otpForm.style.display = 'none';
        verifyBox.style.display = 'none';
        emailForm.style.display = 'block';
        emailBtn.style.color = 'var(--primary)';
        emailBtn.style.fontWeight = '700';
        otpBtn.style.color = 'var(--text-muted)';
        otpBtn.style.fontWeight = '500';
      }
    }

    function triggerGoogleMockLogin() {
      const user = { name: 'Sravani Prasanna', email: 'sravani.p@gmail.com', avatar: 'https://images.unsplash.com/photo-1583391733956-3750e0ff4e8b?auto=format&fit=crop&q=80&w=50' };
      localStorage.setItem('saviaa_user', JSON.stringify(user));
      showToast("Signed in via Google successfully!");
      
      setTimeout(() => {
        // Redirect back to dashboard or checkout path
        redirectDestination();
      }, 1200);
    }

    function triggerOTPRequest(e) {
      e.preventDefault();
      const phone = document.getElementById('otp-phone').value;
      
      // Toggle to verify view
      document.getElementById('form-otp-auth').style.display = 'none';
      document.getElementById('otp-verification-box').style.display = 'block';
      showToast("OTP verification code dispatched to WhatsApp!");
      
      // Auto focus first digit
      setTimeout(() => {
        document.querySelector('.otp-digit').focus();
      }, 200);
    }

    function triggerVerifyOTP() {
      // Mock verify
      const user = { name: 'Sravani P.', email: 'sravani@gmail.com' };
      localStorage.setItem('saviaa_user', JSON.stringify(user));
      showToast("WhatsApp OTP code verified!", "success");
      
      setTimeout(() => {
        redirectDestination();
      }, 1000);
    }

    function triggerEmailRequest(e) {
      e.preventDefault();
      const email = document.getElementById('auth-email').value;
      showToast(`Magic login link dispatched to ${email}! Check inbox.`);
      
      // Auto simulate click link
      setTimeout(() => {
        const user = { name: 'Sravani P.', email: email };
        localStorage.setItem('saviaa_user', JSON.stringify(user));
        redirectDestination();
      }, 2000);
    }

    function redirectDestination() {
      // Check if redirect parameters exists, else default to dashboard
      const urlParams = new URLSearchParams(window.location.search);
      const redirect = urlParams.get('redirect');
      if (redirect) {
        window.location.href = redirect;
      } else {
        window.location.href = 'dashboard.html';
      }
    }
  </script>
</body>
</html>
